name: 매일 서적 초안 생성

# 매일 1권씩 AI 초안을 만들어 Supabase 에 draft 로 넣는다.
# 발행은 하지 않는다 — 관리자가 /wiki/admin 에서 검수·승인해야만 공개된다.
#
# 💰 과금: Claude Code 를 **Max 구독 토큰**(CLAUDE_CODE_OAUTH_TOKEN)으로 인증하므로
#    API 종량제 청구가 발생하지 않는다. 구독 사용량 한도에서 차감된다.
#
# ⚠️ ANTHROPIC_API_KEY 를 이 워크플로 어디에도 넣지 말 것!
#    Claude Code 의 인증 우선순위상 API 키가 OAuth 토큰보다 앞서므로,
#    존재하면 조용히 종량제로 과금된다.

on:
  schedule:
    # UTC 21:00 = KST 06:00 (매일 아침)
    - cron: "0 21 * * *"
  workflow_dispatch: # 수동 실행(테스트용)

# 동시 실행 방지 — 겹쳐 돌면 같은 날 중복 생성된다.
concurrency:
  group: daily-book
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      # claude-code-action 은 GitHub OIDC 토큰을 발급받아 인증을 교환한다.
      # 이 권한이 없으면 러너에 ACTIONS_ID_TOKEN_REQUEST_URL 이 주입되지 않아
      # "Could not fetch an OIDC token" 으로 실패한다.
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 이 워크플로는 앱을 빌드하지 않는다. 필요한 건 Supabase 클라이언트 하나뿐이다.
      # `npm ci` 로 전체 의존성을 깔지 않는 이유:
      #   - 불필요하다(next·eslint·tailwind 를 설치할 이유가 없다)
      #   - eslint 의존성 아래 중첩된 wasm 선택적 패키지(@emnapi/*)에서 npm 이
      #     락파일을 스스로 모순되게 만들어 `npm ci` 가 EUSAGE 로 실패한다(npm 버그).
      #     락파일을 손대면 Vercel 배포 쪽이 위험하므로 여기서 우회한다.
      - name: Supabase 클라이언트 설치
        run: npm install --no-save --no-package-lock @supabase/supabase-js@^2

      - name: 1) 집필 컨텍스트 수집 (기존 토픽·서적 → .ai/context.json)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ai/fetch-context.mjs

      - name: 2) 집필 (Claude Code — Max 구독 인증)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # github_token 을 명시하면 액션이 OIDC → Claude GitHub App 토큰 교환을 건너뛴다.
          # 그 교환은 PR 댓글 등 리포지토리 상호작용용인데, 이 워크플로는 파일만 쓰므로 불필요하다.
          # (넘기지 않으면 "Claude Code is not installed on this repository" 로 실패한다.)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # WebSearch/WebFetch 를 허용해 **실제 웹에서 최신 트렌드를 조사**하게 한다.
          # 모델의 기억에만 의존하면 "지금 무엇이 많이 검색되는지"를 알 수 없다.
          # 챕터를 하나씩 쓰므로 턴 수가 많이 필요하다.
          claude_args: >-
            --allowedTools Read,Write,Edit,Glob,Grep,WebSearch,WebFetch
            --max-turns 120
          prompt: |
            당신은 IT 학습 플랫폼 LogiWiki 의 기술 서적 저자입니다.
            오늘 발행할 **교과서 품질의 서적 1권**을 조사·기획·집필합니다.

            ⚠️ 산출물은 **파일**입니다. 답변 텍스트로 내용을 출력하는 것으로는 부족합니다.
            반드시 Write 도구로 디스크에 저장하세요. 저장하지 않으면 다음 단계가 실패합니다.

            ---

            ## 1단계 — 트렌드 조사 (WebSearch 필수)

            먼저 `.ai/context.json` 을 읽으세요. 기존 토픽과 **이미 만든 서적 제목**이 들어 있습니다.

            그다음 **WebSearch 로 실제 검색**해서 지금 학습 수요가 높은 주제를 파악하세요.
            최소 3회 이상 검색하고, 근거를 확인한 뒤 주제를 정합니다. 검색 예시:

            - "개발자 학습 트렌드 2026" / "developer survey 2026 most wanted"
            - "가장 많이 찾는 프로그래밍 주제" / "trending programming topics"
            - 후보 기술의 최근 릴리스·마이그레이션 이슈 (예: "React 20 breaking changes")
            - Stack Overflow Developer Survey, GitHub Octoverse, State of JS 등 실제 통계

            **주제 선정 기준(중요도 순):**
            1. **이미 만든 서적과 겹치지 않을 것** (context.json 의 existingBooks 확인)
            2. **검색 수요가 실제로 있을 것** — 사람들이 검색창에 칠 법한 문제여야 한다
            3. **구체적일 것** — 서적 한 권 분량으로 좁혀진 주제
               - 나쁨: "자바" (너무 넓음) / "React 20 useOptimistic 훅" (너무 좁음)
               - 좋음: "자바 동시성 — 스레드부터 가상 스레드까지"
            4. 가능하면 **기존 토픽을 재사용**. 어디에도 속하지 않는 분야일 때만 새 토픽을 만든다
               (예: Rust, Kubernetes, 보안, 시스템 디자인)

            ## 2단계 — SEO 를 고려한 기획

            **제목**은 사람이 실제로 검색할 법한 문장이어야 합니다.
            - 나쁨: "심층 탐구: 현대적 상태 관리의 패러다임"  ← 아무도 이렇게 검색하지 않는다
            - 좋음: "React 상태 관리 완벽 가이드 — useState부터 Zustand까지"

            **description**(2~3문장)에는 이 서적이 **어떤 문제를 해결해 주는지** 쓰세요.
            검색 결과 스니펫과 카드에 그대로 노출됩니다. 60자 이상.

            **챕터 제목**도 검색 의도를 반영하세요. 각 챕터가 하나의 질문에 답하는 형태가 좋습니다.
            ("useMemo는 언제 써야 하는가" 처럼)

            기획안을 `.ai/outline.json` 으로 저장하세요:

            ```json
            {
              "topic_slug": "react",
              "topic_label": "새 토픽일 때만: 표시명",
              "topic_description": "새 토픽일 때만: 30자 내외 설명",
              "topic_accent": "새 토픽일 때만: context.json 의 allowedAccents 중 하나",
              "language": "ko",
              "slug": "react-rendering-optimization",
              "title": "React 렌더링 최적화 — 불필요한 리렌더링 잡는 법",
              "description": "60자 이상. 이 서적이 해결해 주는 문제를 구체적으로.",
              "chapters": [
                { "slug": "why-rerender", "title": "왜 리렌더링이 일어나는가", "summary": "이 챕터에서 다룰 내용 한 줄" }
              ]
            }
            ```

            🚨 **`slug` 와 챕터 `slug` 는 영문 소문자·숫자·하이픈만** (3~60자).
            제목이 한글이어도 slug 는 영어로 지으세요. 한글 slug 는 DB 조회가 깨져 404 가 됩니다.

            **챕터는 8~12개**로 구성하세요(최소 6개). 흐름:
            도입(왜 필요한가) → 기초 개념 → 심화 → 실전 적용 → 함정·안티패턴 → 마무리

            ## 3단계 — 챕터별 집필 (하나씩, 파일로)

            **챕터를 하나씩 순서대로** `.ai/chapters/<chapter-slug>.md` 파일로 저장하세요.
            (한 번에 몰아서 쓰지 말고, 한 챕터를 완성해 저장한 뒤 다음 챕터로 넘어가세요.
             그래야 뒤쪽 챕터의 품질이 떨어지지 않습니다.)

            **각 챕터는 최소 1,500자 이상**(한글 기준)이며 다음 구조를 따릅니다:

            ```
            ## 학습 목표
            - (2~3개, 이 챕터를 읽고 무엇을 할 수 있게 되는지)

            ## (개념 설명 — 소제목을 자유롭게)
            개념을 **자신의 말로** 설명. 공식 문서 복붙 금지.
            왜 그렇게 동작하는지 원리를 설명할 것. "무엇"보다 "왜"가 중요하다.

            ```언어
            // 실제로 동작하는 코드 예제 (필수)
            ```

            ## 흔한 함정
            초보자가 실제로 겪는 실수와 그 원인. 코드로 보여줄 것.

            ## 요약
            - (3~4개 불릿)

            ## 연습
            독자가 직접 해볼 문제 1개.
            ```

            ## 다이어그램 (중요)

            글로만 설명하기 어려운 개념은 **Mermaid 다이어그램**으로 그리세요.
            사이트가 자동으로 SVG 로 렌더합니다. ```mermaid 코드펜스를 쓰면 됩니다.

            ```mermaid
            flowchart TD
              A["콜 스택이 비었는가?"] -->|예| B["마이크로태스크 큐를 전부 비운다"]
              B --> C["매크로태스크를 1개 실행"]
              C --> A
            ```

            **서적 전체에 최소 2개 이상**의 다이어그램을 넣으세요. 쓸 만한 곳:

            | 다이어그램 | 언제 |
            |---|---|
            | `flowchart` | 실행 흐름, 의사결정 트리, 알고리즘 단계 |
            | `sequenceDiagram` | 요청·응답, 컴포넌트 간 상호작용, 라이프사이클 |
            | `stateDiagram-v2` | 상태 전이(연결 상태, 컴포넌트 생명주기) |
            | `erDiagram` | DB 스키마, 엔티티 관계 |
            | `classDiagram` | 타입·상속 구조 |

            🚨 **장식용 다이어그램은 넣지 마세요.** "이해를 돕는가?"가 유일한 기준입니다.
            글로 한 문장이면 끝나는 걸 그림으로 그리는 건 오히려 방해입니다.

            ⚠️ 다이어그램 라벨은 **큰따옴표로 감싸세요** (`A["콜 스택"]`).
            괄호·콜론 등이 들어가면 따옴표 없이는 문법 오류가 납니다.

            ## 품질 규칙 (위반 시 삽입이 거부됩니다)

            - 각 챕터에 **코드블록(```)이 최소 1개** — 실행 가능한 코드여야 함
            - 본문 **제목은 h2(##)부터** — 챕터 제목은 시스템이 h1 으로 따로 표시합니다
              (h1 을 쓰면 삽입 단계에서 자동으로 한 단계 낮춥니다. 코드블록 안의 `#` 주석은 무관)
            - 최소 1,200자 (권장 1,500자 이상)
            - **서적 전체에 mermaid 다이어그램 2개 이상**
            - 버전에 따라 동작이 다르면 명시할 것
            - 표(|---|)와 비교를 적극 활용할 것

            ## 4단계 — 최종 확인

            마지막에 다음을 확인하세요:
            - `.ai/outline.json` 이 유효한 JSON 인가
            - `outline.chapters` 의 모든 slug 에 대해 `.ai/chapters/<slug>.md` 가 존재하는가
            - 각 파일이 1,200자를 넘고 코드블록을 포함하는가

            빠진 챕터가 있으면 지금 작성하세요.

      # 삽입 전에 무엇이 만들어졌는지 사람이 읽을 수 있게 요약한다.
      # (실패해도 "파일 없음" 외에 정보가 없으면 원인을 알 수 없다)
      - name: 집필 결과 확인
        run: |
          if [ ! -f .ai/outline.json ]; then
            echo "::error::Claude Code 가 .ai/outline.json 을 만들지 않았습니다."
            ls -la .ai/ 2>/dev/null || echo "(.ai 디렉터리 없음)"
            exit 1
          fi
          node -e "
            const fs = require('fs');
            const o = JSON.parse(fs.readFileSync('.ai/outline.json', 'utf8'));
            console.log('제목  :', o.title);
            console.log('토픽  :', o.topic_slug);
            console.log('slug  :', o.slug);
            console.log('소개  :', (o.description ?? '').length, '자');
            console.log('챕터  :', (o.chapters ?? []).length, '개');
            console.log('');
            let total = 0, missing = 0, diagrams = 0;
            for (const c of o.chapters ?? []) {
              const f = '.ai/chapters/' + c.slug + '.md';
              if (!fs.existsSync(f)) { console.log('  ❌ 없음  ', c.slug); missing++; continue; }
              const body = fs.readFileSync(f, 'utf8');
              total += body.length;
              const code = body.includes('\`\`\`') ? '코드O' : '코드X';
              console.log('  ' + (body.trim().length >= 1200 ? '✅' : '⚠️ ') + ' ' +
                String(body.trim().length).padStart(6) + '자  ' + code + '  ' + c.slug + ' — ' + c.title);
            }
            console.log('');
            console.log('총 분량:', total.toLocaleString(), '자  |  다이어그램:', diagrams, '개');
            if (missing) { console.error('::error::챕터 본문 파일 ' + missing + '개 누락'); process.exit(1); }
          "

      - name: 3) 초안 삽입 (검증 → Supabase, status=draft)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ai/insert-book.mjs

      - name: 실패 시 산출물 업로드(디버깅용)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-output
          path: .ai/
          retention-days: 7
