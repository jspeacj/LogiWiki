name: 매일 서적 초안 생성

# 매일 1권씩 AI 초안을 만들어 Supabase 에 draft 로 넣는다.
# 발행은 하지 않는다 — 관리자가 /wiki/admin 에서 검수·승인해야만 공개된다.
#
# 💰 과금: Claude Code 를 **Max 구독 토큰**(CLAUDE_CODE_OAUTH_TOKEN)으로 인증하므로
#    API 종량제 청구가 발생하지 않는다. 구독 사용량 한도에서 차감된다.
#
# ⚠️ ANTHROPIC_API_KEY 를 이 워크플로 어디에도 넣지 말 것!
#    Claude Code 의 인증 우선순위상 API 키가 OAuth 토큰보다 앞서므로,
#    존재하면 조용히 종량제로 과금된다.

on:
  schedule:
    # UTC 21:00 = KST 06:00 (매일 아침)
    - cron: "0 21 * * *"
  workflow_dispatch: # 수동 실행(테스트용)

# 동시 실행 방지 — 겹쳐 돌면 같은 날 중복 생성된다.
concurrency:
  group: daily-book
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 이 워크플로는 앱을 빌드하지 않는다. 필요한 건 Supabase 클라이언트 하나뿐이다.
      # `npm ci` 로 전체 의존성을 깔지 않는 이유:
      #   - 불필요하다(next·eslint·tailwind 를 설치할 이유가 없다)
      #   - eslint 의존성 아래 중첩된 wasm 선택적 패키지(@emnapi/*)에서 npm 이
      #     락파일을 스스로 모순되게 만들어 `npm ci` 가 EUSAGE 로 실패한다(npm 버그).
      #     락파일을 손대면 Vercel 배포 쪽이 위험하므로 여기서 우회한다.
      - name: Supabase 클라이언트 설치
        run: npm install --no-save --no-package-lock @supabase/supabase-js@^2

      - name: 1) 집필 컨텍스트 수집 (기존 토픽·서적 → .ai/context.json)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ai/fetch-context.mjs

      - name: 2) 집필 (Claude Code — Max 구독 인증)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            당신은 IT 학습 플랫폼 LogiWiki 의 기술 서적 저자입니다.
            오늘 발행할 서적 **1권**을 기획하고 집필해 `.ai/book.json` 파일로 저장하세요.

            ## 1단계 — 주제 선정
            `.ai/context.json` 을 읽으세요. 기존 토픽 목록과 이미 만든 서적 제목이 들어 있습니다.

            - **이미 있는 서적과 주제가 겹치면 안 됩니다.**
            - 개발자의 학습 수요가 높고 검색될 만한 구체적인 주제를 고르세요.
              (나쁨: "자바" / 좋음: "자바 동시성 — 스레드부터 가상 스레드까지")
            - 가능하면 기존 토픽을 재사용하세요. 기존 토픽 어디에도 속하지 않는 분야일 때만
              새 토픽을 만듭니다(예: Rust, Kubernetes, 보안).

            ## 2단계 — 집필
            챕터 4~6개. 각 챕터는 **최소 800자 이상**이며 다음 구조를 따릅니다:
            학습 목표 → 개념 설명 → 실행 가능한 코드 예제 → 흔한 함정 → 요약 → 연습문제

            원칙:
            - 공식 문서를 복붙하지 말고 **개념을 자신의 말로** 설명하세요.
            - 코드 예제는 ```언어 코드펜스로 감싸고, 실제로 동작하는 코드여야 합니다.
            - 버전에 따라 다른 동작은 명시하세요.
            - 본문에 h1(#)은 쓰지 마세요. 챕터 제목은 시스템이 따로 표시합니다. h2(##)부터 씁니다.

            ## 3단계 — 저장
            `.ai/book.json` 을 아래 형식으로 **정확히** 저장하세요(다른 파일은 만들지 마세요):

            ```json
            {
              "topic_slug": "기존 토픽 슬러그 또는 새 슬러그(영문 소문자·하이픈, 40자 이내)",
              "topic_label": "새 토픽일 때만: 표시명",
              "topic_description": "새 토픽일 때만: 30자 내외 설명",
              "topic_accent": "새 토픽일 때만: context.json 의 allowedAccents 중 하나",
              "language": "ko",
              "title": "서적 제목",
              "description": "카드·검색에 노출될 2~3문장 소개",
              "chapters": [
                { "slug": "kebab-case", "title": "챕터 제목", "body": "마크다운 본문" }
              ]
            }
            ```

            챕터 slug 는 서로 중복되면 안 됩니다. 마지막에 파일이 유효한 JSON 인지 확인하세요.

      - name: 3) 초안 삽입 (검증 → Supabase, status=draft)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/ai/insert-book.mjs

      - name: 실패 시 산출물 업로드(디버깅용)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-output
          path: .ai/
          retention-days: 7
