<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="LogiWiki">
  <!--
    favicon. 헤더 로고 마크와 같은 정체성이다(components/layout/header.tsx:25-27):
    brand 에서 brand2 로 흐르는 그라디언트 라운드 타일 + 흰색 펼친 책.

    왜 파일로 두는가: app/icon.svg 는 Next 의 파일 규약이라 <link rel="icon"> 이 자동으로
    삽입되고 basePath(/wiki)도 자동으로 붙는다. 수동 <link> 를 layout 에 넣지 말 것
    (basePath 규칙 1에 걸려 경로를 손으로 관리해야 하고 중복 선언이 된다).

    왜 헤더처럼 선(stroke) 아이콘이 아닌 면(silhouette)인가:
    헤더는 lucide BookOpen 을 선으로 그린다. 그대로 16px 로 줄이면 선이 서로 뭉개져
    "흰 덩어리에 세로줄" 이 된다(실제로 16px 로 래스터라이즈해 확인했다 — 책으로 안 읽힌다).
    선을 굵혀도 마찬가지였다. 파비콘 크기에서는 면으로 잡아야 형태가 살아남는다.
    같은 정체성(그라디언트 타일 + 펼친 책)을 유지하되 글리프만 작은 크기에 맞춰 다시 그린 것이다.
    → 헤더를 이걸로 바꾸지 말 것. 큰 크기에서는 선 아이콘이 더 낫다. 서로 다른 크기의 문제다.

    색은 globals.css 브랜드 팔레트(다크)를 하드코딩한다. SVG 는 CSS 변수를 볼 수 없고,
    탭·북마크는 사이트 테마와 무관하게 렌더되므로 한 벌이면 된다.
    globals.css 에서 브랜드 색을 바꾸면 여기도 같이 바꿀 것.

    🚨 XML 주석에 이중 하이픈을 넣지 말 것(CSS 변수명을 그대로 적으면 걸린다).
    파서가 파일 전체를 거부하는데, 빌드는 통과하고 200 으로 서빙되므로(Next 는 이 파일을
    검증하지 않는다) 배포 후에도 조용히 아이콘만 안 뜬다. 고치면 반드시 래스터라이즈해서
    눈으로 확인할 것.
  -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="1" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#g)" />

  <g fill="#ffffff">
    <!-- 왼쪽 페이지 -->
    <path d="M15 11.2C13.1 9.4 10.4 8.6 7.4 8.6 6.6 8.6 6 9.2 6 10v12.2c0 .8.6 1.4 1.4 1.4 2.8 0 5.2.7 7 2.2.3.3.6.1.6-.3V11.2z" />
    <!-- 오른쪽 페이지 -->
    <path d="M17 11.2c1.9-1.8 4.6-2.6 7.6-2.6.8 0 1.4.6 1.4 1.4v12.2c0 .8-.6 1.4-1.4 1.4-2.8 0-5.2.7-7 2.2-.3.3-.6.1-.6-.3V11.2z" />
  </g>
</svg>
